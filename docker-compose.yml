services:
  postgres:
    image: postgres:16-alpine
    container_name: outlet-validator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: outlet_validator
    ports:
      - "5432:5432"
    volumes:
      - outlet-validator-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d outlet_validator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  outlet-validator-postgres:
